<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>F1 Drift 3D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #canvas-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* Track selector UI */
      #track-selector {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        gap: 8px;
        z-index: 10;
        pointer-events: auto;
      }
      .track-btn {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.7);
        padding: 6px 12px;
        border-radius: 4px;
        font-family: 'Courier New', monospace;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .track-btn:hover {
        background: rgba(0, 0, 0, 0.8);
        border-color: rgba(255, 255, 255, 0.6);
        color: #fff;
      }
      .track-btn.active {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.8);
        color: #fff;
      }
      /* Mute indicator */
      #mute-indicator {
        position: absolute;
        top: 16px;
        right: 16px;
        color: rgba(255, 255, 255, 0.5);
        font-family: 'Courier New', monospace;
        font-size: 11px;
        z-index: 10;
        pointer-events: none;
      }
      /* Mobile touch controls */
      #touch-controls {
        display: none;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 200px;
        pointer-events: none;
        z-index: 10;
      }
      #joystick-container {
        position: absolute;
        left: 40px;
        bottom: 40px;
        width: 120px;
        height: 120px;
        pointer-events: auto;
      }
      #joystick-outer {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.25);
        position: relative;
      }
      #joystick-inner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: none;
      }
      #handbrake-btn {
        position: absolute;
        right: 40px;
        bottom: 60px;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(200, 40, 40, 0.7);
        border: 2px solid rgba(255, 80, 80, 0.8);
        color: #fff;
        font-family: 'Courier New', monospace;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px rgba(200, 40, 40, 0.4);
        transition: box-shadow 0.1s;
      }
      #handbrake-btn.active {
        background: rgba(255, 60, 60, 0.9);
        box-shadow: 0 0 30px rgba(255, 60, 60, 0.8);
      }
      .touch-active #touch-controls {
        display: block;
      }
      /* Controls hint */
      #controls-hint {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.4);
        font-family: 'Courier New', monospace;
        font-size: 11px;
        z-index: 10;
        pointer-events: none;
        text-align: center;
      }
      .touch-active #controls-hint {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>

      <!-- Track Selector -->
      <div id="track-selector">
        <button class="track-btn active" data-track="night">Night</button>
        <button class="track-btn" data-track="dusk">Dusk</button>
        <button class="track-btn" data-track="industrial">Industrial</button>
      </div>

      <!-- Mute Indicator -->
      <div id="mute-indicator">M: MUTE</div>

      <!-- Mobile Touch Controls -->
      <div id="touch-controls">
        <div id="joystick-container">
          <div id="joystick-outer">
            <div id="joystick-inner"></div>
          </div>
        </div>
        <div id="handbrake-btn">HB</div>
      </div>

      <!-- Desktop Controls Hint -->
      <div id="controls-hint">W/S: THROTTLE/BRAKE &nbsp;|&nbsp; A/D: STEER &nbsp;|&nbsp; SPACE: HANDBRAKE</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
